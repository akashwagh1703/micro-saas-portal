# Render Blueprint: static site for the Vite/React portal.
# Served at the domain root, so VITE_BASE_PATH=/ (overrides the default /micro-saas/).
services:
  - type: web
    name: micro-saas-portal
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Serve from the domain root on Render.
      - key: VITE_BASE_PATH
        value: /
      # Deployed API base, including the /api prefix.
      - key: VITE_API_URL
        value: https://micro-saas-api-at7p.onrender.com/api
    # SPA fallback: let React Router handle client-side routes.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
